name: Sync upstream & update index

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    paths:
      - 'design-md/*/DESIGN.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync from upstream
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git remote add upstream https://github.com/VoltAgent/awesome-design-md.git || true
          git fetch upstream main
          git merge upstream/main --no-edit --allow-unrelated-histories || true

      - name: Generate index.json
        run: |
          dirs=$(find design-md -mindepth 1 -maxdepth 1 -type d -exec test -f {}/DESIGN.md \; -print \
            | xargs -I{} basename {} \
            | sort)
          echo "$dirs" | jq -R -s 'split("\n") | map(select(. != ""))' > design-md/index.json

      - name: Push if changed
        run: |
          git add -A
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Chore: upstream 동기화 및 index.json 갱신"
          git push
